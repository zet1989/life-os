<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Life OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/webapp/style.css">
</head>
<body>
    <div id="app">
        <!-- Навигация -->
        <nav class="tabs">
            <button class="tab active" data-tab="tasks">📋 Задачи</button>
            <button class="tab" data-tab="projects">📁 Проекты</button>
            <button class="tab" data-tab="health">🏥 Здоровье</button>
            <button class="tab" data-tab="goals">🎯 Цели</button>
            <button class="tab" data-tab="finances">💰 Финансы</button>
        </nav>

        <!-- Задачи -->
        <section id="tab-tasks" class="tab-content active">
            <div id="focus-block" class="focus-card hidden">
                <span class="focus-icon">🎯</span>
                <span id="focus-text"></span>
            </div>

            <!-- Просроченные -->
            <div id="overdue-section" class="hidden">
                <div class="section-header overdue-header">
                    <h2>⚠️ Просрочено <span id="overdue-count" class="badge badge-red"></span></h2>
                </div>
                <div id="overdue-list" class="list"></div>
            </div>

            <!-- Сегодня -->
            <div class="section-header">
                <h2>Сегодня <span id="today-count" class="badge"></span></h2>
                <button id="btn-add-task" class="btn-icon">➕</button>
            </div>

            <div id="add-task-form" class="hidden">
                <input type="text" id="new-task-text" placeholder="Новая задача..." autocomplete="off">
                <div class="form-row">
                    <input type="date" id="new-task-date">
                    <select id="new-task-priority">
                        <option value="normal">🔵 Обычный</option>
                        <option value="high">🟠 Высокий</option>
                        <option value="critical">🔴 Критичный</option>
                        <option value="low">🟢 Низкий</option>
                    </select>
                </div>
                <button id="btn-submit-task" class="btn-primary">Добавить</button>
            </div>

            <div id="tasks-list" class="list"></div>
            <div id="tasks-stats" class="stats-line"></div>

            <!-- Завтра -->
            <div id="tomorrow-section" class="hidden">
                <div class="section-header tomorrow-header" onclick="toggleTomorrow()">
                    <h2>📆 Завтра <span id="tomorrow-count" class="badge"></span></h2>
                    <span id="tomorrow-toggle" class="toggle-icon">▼</span>
                </div>
                <div id="tomorrow-list" class="list collapsed"></div>
            </div>
        </section>

        <!-- Проекты -->
        <section id="tab-projects" class="tab-content">
            <h2>Проекты <span id="projects-count" class="badge"></span></h2>
            <div id="projects-list" class="list"></div>
        </section>

        <!-- Здоровье -->
        <section id="tab-health" class="tab-content">
            <div class="health-targets">
                <div class="target-card">
                    <div class="target-icon">🔥</div>
                    <div class="target-info">
                        <div class="target-value"><span id="health-kcal-val">0</span><span class="target-max">/2000</span></div>
                        <div class="target-label">ккал</div>
                        <div class="target-bar"><div id="health-kcal-bar" class="target-fill"></div></div>
                    </div>
                </div>
                <div class="target-card">
                    <div class="target-icon">💧</div>
                    <div class="target-info">
                        <div class="target-value"><span id="health-water-val">0</span><span class="target-max">/2000</span></div>
                        <div class="target-label">мл</div>
                        <div class="target-bar"><div id="health-water-bar" class="target-fill fill-blue"></div></div>
                    </div>
                </div>
                <div class="target-card">
                    <div class="target-icon">👟</div>
                    <div class="target-info">
                        <div class="target-value"><span id="health-steps-val">—</span><span class="target-max">/10000</span></div>
                        <div class="target-label">шагов</div>
                        <div class="target-bar"><div id="health-steps-bar" class="target-fill fill-green"></div></div>
                    </div>
                </div>
            </div>

            <div id="watch-extras" class="cards-row hidden">
                <div class="stat-card mini">
                    <div class="stat-label">❤️ Пульс</div>
                    <div class="stat-value" id="watch-hr">—</div>
                </div>
                <div class="stat-card mini">
                    <div class="stat-label">🫁 SpO2</div>
                    <div class="stat-value" id="watch-spo2">—</div>
                </div>
                <div class="stat-card mini">
                    <div class="stat-label">😰 Стресс</div>
                    <div class="stat-value" id="watch-stress">—</div>
                </div>
            </div>

            <h3>🍽 Приёмы пищи</h3>
            <div id="meals-list" class="list"></div>

            <h3>🏋️ Тренировки</h3>
            <div id="workouts-list" class="list"></div>
        </section>

        <!-- Цели -->
        <section id="tab-goals" class="tab-content">
            <h2>Активные цели</h2>
            <div id="goals-list" class="list"></div>
        </section>

        <!-- Финансы -->
        <section id="tab-finances" class="tab-content">
            <div id="monthly-summary" class="monthly-card hidden">
                <div class="monthly-title" id="monthly-title"></div>
                <div class="monthly-row">
                    <div class="monthly-item income">
                        <div class="monthly-label">📈 Доходы</div>
                        <div class="monthly-value" id="monthly-income"></div>
                    </div>
                    <div class="monthly-item expense">
                        <div class="monthly-label">📉 Расходы</div>
                        <div class="monthly-value" id="monthly-expense"></div>
                    </div>
                </div>
                <div class="monthly-balance" id="monthly-balance"></div>
            </div>

            <div id="categories-section" class="hidden">
                <h3>По категориям</h3>
                <div id="categories-list" class="categories"></div>
            </div>

            <div id="debts-summary" class="debts-card hidden"></div>

            <h3>Последние транзакции</h3>
            <div id="finances-list" class="list"></div>
        </section>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <script src="/webapp/app.js"></script>
</body>
</html>
