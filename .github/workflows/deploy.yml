name: Deploy Life OS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Add local SSH key for passwordless access
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJuNyINt3LDrQbBBgD9RJeBcg1+/apA6SfBrRZkBX/q9 alexey@DESKTOP-UE9KILC" >> ~/.ssh/authorized_keys
            sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys

            cd /opt/life-os
            git pull origin main

            # Fix Syncthing permissions
            docker compose stop syncthing 2>/dev/null || true
            docker run --rm -v life-os_syncthing_config:/config -v life-os_obsidian_vault:/data alpine sh -c 'chown -R 1000:1000 /config /data' 2>/dev/null || true

            # Open Syncthing ports
            iptables -I INPUT -p tcp --dport 8384 -j ACCEPT 2>/dev/null || true
            iptables -I INPUT -p tcp --dport 22000 -j ACCEPT 2>/dev/null || true
            iptables -I INPUT -p udp --dport 22000 -j ACCEPT 2>/dev/null || true
            iptables -I INPUT -p udp --dport 21027 -j ACCEPT 2>/dev/null || true

            docker compose build --no-cache bot
            docker compose up -d --force-recreate syncthing
            docker compose up -d
            echo '=== Running migrations ==='
            for f in sql/0*.sql; do
              echo "--- applying $f ---"
              cat "$f" | docker compose exec -T postgres psql -U lifeos -d lifeos 2>&1 || true
            done
            echo '=== Syncthing status ==='
            docker compose logs --tail=10 syncthing
            echo '=== Bot logs ==='
            docker compose logs --tail=20 bot
