server {
    listen 80;
    server_name zyryanov-n8n.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name zyryanov-n8n.ru;

    ssl_certificate     /etc/letsencrypt/live/zyryanov-n8n.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zyryanov-n8n.ru/privkey.pem;

    # Hardened SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Health-check
    location /status {
        proxy_pass http://bot:8443;
        proxy_set_header Host $host;
    }

    # Webhook endpoints для всех ботов
    location /webhook/ {
        proxy_pass http://bot:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web App (Mini App) — статика + API
    location /webapp {
        proxy_pass http://bot:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://bot:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Запретить всё остальное
    location / {
        return 404;
    }
}
