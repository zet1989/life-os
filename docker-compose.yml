services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - media_data:/app/media
      - whisper_cache:/root/.cache/huggingface
      - obsidian_vault:/app/obsidian-vault
      - pg_backups:/app/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8443/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeos}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
      - ./sql:/migrations:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/life-os.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - bot
    profiles:
      - production

  syncthing:
    image: syncthing/syncthing:latest
    restart: unless-stopped
    hostname: life-os-syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - STGUIADDRESS=0.0.0.0:8384
    volumes:
      - syncthing_config:/var/syncthing/config
      - obsidian_vault:/var/syncthing/data/LifeOS
    ports:
      - "8384:8384"       # Web UI
      - "22000:22000/tcp" # Sync protocol
      - "22000:22000/udp"
      - "21027:21027/udp" # Discovery

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - bot

volumes:
  pg_data:
  pg_backups:
  redis_data:
  media_data:
  whisper_cache:
  syncthing_config:
  obsidian_vault:
  uptime_kuma_data:
